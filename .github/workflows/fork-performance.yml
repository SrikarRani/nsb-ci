name: Fork Performance

on:
  push:
    paths-ignore:
      - "docs/**"
  workflow_dispatch:
    inputs:
      perf_repo:
        description: "Owner/repo for the perf harness"
        required: false
        default: "VasaviSD/nsb-ns3-perf-testing"
        type: string
      ns3_ref:
        description: "ns-3 branch, tag, or commit to clone"
        required: false
        default: "master"
        type: string
      nodes:
        description: "Comma-separated node counts"
        required: false
        default: "5,15,25"
        type: string
      rates:
        description: "Comma-separated message rates"
        required: false
        default: "10,30,50"
        type: string
      duration:
        description: "Seconds per sweep run"
        required: false
        default: "10"
        type: string
      max_avg_rtt_s:
        description: "Optional failure threshold for avg_rtt_s"
        required: false
        default: ""
        type: string
      max_avg_cpu_percent:
        description: "Optional failure threshold for avg_cpu_percent"
        required: false
        default: ""
        type: string
      max_peak_memory_mb:
        description: "Optional failure threshold for peak_memory_mb"
        required: false
        default: ""
        type: string
      max_drop_rate_percent:
        description: "Optional failure threshold for drop_rate_percent"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  perf:
    if: github.repository_owner != 'nsb-ucsc'
    runs-on: ubuntu-latest
    env:
      PERF_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.perf_repo || 'VasaviSD/nsb-ns3-perf-testing' }}
      NS3_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ns3_ref || 'master' }}
      NODES: ${{ github.event_name == 'workflow_dispatch' && inputs.nodes || '5,25,50,100,200' }}
      RATES: ${{ github.event_name == 'workflow_dispatch' && inputs.rates || '10' }}
      DURATION: ${{ github.event_name == 'workflow_dispatch' && inputs.duration || '5' }}
      PUSH_PERF_CASES: "5:10,5:50,25:50,50:100,100:100"
      MAX_AVG_RTT_S: ${{ github.event_name == 'workflow_dispatch' && inputs.max_avg_rtt_s || '' }}
      MAX_AVG_CPU_PERCENT: ${{ github.event_name == 'workflow_dispatch' && inputs.max_avg_cpu_percent || '' }}
      MAX_PEAK_MEMORY_MB: ${{ github.event_name == 'workflow_dispatch' && inputs.max_peak_memory_mb || '' }}
      MAX_DROP_RATE_PERCENT: ${{ github.event_name == 'workflow_dispatch' && inputs.max_drop_rate_percent || '' }}

    steps:
      - name: Check out NSB
        uses: actions/checkout@v4
        with:
          path: nsb

      - name: Check out perf harness
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PERF_REPO }}
          path: nsb-ns3-perf-testing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            git \
            protobuf-compiler \
            libprotobuf-dev \
            libyaml-cpp-dev \
            libhiredis-dev \
            python3-venv \
            python3-pip

      - name: Install modern Abseil on Linux
        run: |
          git clone --depth 1 https://github.com/abseil/abseil-cpp.git "${RUNNER_TEMP}/abseil-cpp"
          cmake -S "${RUNNER_TEMP}/abseil-cpp" -B "${RUNNER_TEMP}/abseil-build" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DABSL_ENABLE_INSTALL=ON \
            -DCMAKE_INSTALL_PREFIX="/usr/local"
          cmake --build "${RUNNER_TEMP}/abseil-build"
          sudo cmake --install "${RUNNER_TEMP}/abseil-build"

      - name: Build and install NSB under /usr/local
        working-directory: nsb
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          sudo cmake --install build --config Release
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Clone ns-3
        run: git clone --depth 1 --branch "$NS3_REF" https://gitlab.com/nsnam/ns-3-dev.git ns-3-dev

      - name: Locate generated NSB protobuf headers
        shell: bash
        run: |
          proto_header="$(find "${GITHUB_WORKSPACE}/nsb" -name nsb.pb.h | head -n1 || true)"
          if [[ -z "${proto_header}" && -d /usr/local/nsb/include ]]; then
            proto_header="$(find /usr/local/nsb/include -name nsb.pb.h | head -n1 || true)"
          fi
          if [[ -z "${proto_header}" ]]; then
            echo "Could not locate nsb.pb.h after NSB build/install" >&2
            find "${GITHUB_WORKSPACE}/nsb" -maxdepth 5 -type d | sort >&2 || true
            exit 1
          fi
          echo "NSB_PROTO_INCLUDE_DIR=$(dirname "${proto_header}")" >> "$GITHUB_ENV"

      - name: Install ns-3 scratch overlay
        shell: bash
        run: |
          mkdir -p ns-3-dev/scratch/nsb-perf
          cat > ns-3-dev/scratch/nsb-perf/CMakeLists.txt <<'EOF'
          set(NSB_SIM_SOURCE "${PROJECT_SOURCE_DIR}/../nsb/examples/ns3/nsb-testing-tcp.cc")
          set(NSB_SOURCE_INCLUDE_DIR "$ENV{GITHUB_WORKSPACE}/nsb/cpp/include")
          set(NSB_SOURCE_PROTO_INCLUDE_DIR "$ENV{NSB_PROTO_INCLUDE_DIR}")

          if(NOT EXISTS "${NSB_SIM_SOURCE}")
            message(FATAL_ERROR "NSB simulation source not found: ${NSB_SIM_SOURCE}")
          endif()

          find_library(NSB_LIBRARY nsb PATHS /usr/local/nsb/lib REQUIRED NO_DEFAULT_PATH)

          if(NOT EXISTS "${NSB_SOURCE_INCLUDE_DIR}")
            message(FATAL_ERROR "NSB source include directory not found: ${NSB_SOURCE_INCLUDE_DIR}")
          endif()

          if(NOT EXISTS "${NSB_SOURCE_PROTO_INCLUDE_DIR}")
            message(FATAL_ERROR "NSB generated protobuf headers not found: ${NSB_SOURCE_PROTO_INCLUDE_DIR}")
          endif()

          include_directories("${NSB_SOURCE_INCLUDE_DIR}" "${NSB_SOURCE_PROTO_INCLUDE_DIR}")

          build_exec(
            EXECNAME nsb-testing-tcp
            SOURCE_FILES "${NSB_SIM_SOURCE}"
            LIBRARIES_TO_LINK "${NSB_LIBRARY}"
                              "${ns3-libs}"
                              "${ns3-contrib-libs}"
            EXECUTABLE_DIRECTORY_PATH ${CMAKE_OUTPUT_DIRECTORY}/scratch/nsb-perf
          )
          EOF

      - name: Configure and build ns-3
        working-directory: ns-3-dev
        run: |
          ./ns3 configure --build-profile=release --enable-examples --disable-tests
          ./ns3 build

      - name: Run curated push perf suite
        if: github.event_name == 'push'
        working-directory: nsb-ns3-perf-testing
        env:
          NSB_NS3_BASE_DIR: ${{ github.workspace }}
        run: |
          python ../nsb/.github/scripts/run_perf_cases.py \
            --perf-root . \
            --cases "$PUSH_PERF_CASES" \
            --duration "$DURATION" \
            --output-root ./results \
            --summary-csv ./results/perf_summary.csv \
            --capture-arg "--daemon-cmd" \
            --capture-arg "./build/nsb_daemon config-ns3-perf.yaml" \
            --capture-arg "--ns3-cmd" \
            --capture-arg "./ns3 run nsb-testing-tcp"

      - name: Run manual performance sweep
        if: github.event_name == 'workflow_dispatch'
        working-directory: nsb-ns3-perf-testing
        env:
          NSB_NS3_BASE_DIR: ${{ github.workspace }}
        run: |
          ./scripts/run_perf_sweep.sh \
            --nodes "$NODES" \
            --rates "$RATES" \
            --duration "$DURATION" \
            --capture-arg "--daemon-cmd" \
            --capture-arg "./build/nsb_daemon config-ns3-perf.yaml" \
            --capture-arg "--ns3-cmd" \
            --capture-arg "./ns3 run nsb-testing-tcp"

      - name: Generate performance plots
        working-directory: nsb-ns3-perf-testing
        run: |
          ./.venv/bin/python -m pip install matplotlib
          ./.venv/bin/python ./scripts/plot_perf_metrics.py \
            --csv ./results/perf_summary.csv \
            --out-dir ./results/plots

      - name: Write readable performance summary
        if: always()
        run: |
          python nsb/.github/scripts/write_perf_summary.py \
            --csv nsb-ns3-perf-testing/results/perf_summary.csv \
            --output perf-summary.md \
            --title "NSB Performance Summary"
          cat perf-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce optional thresholds
        run: >
          python nsb/.github/scripts/check_perf_thresholds.py
          nsb-ns3-perf-testing/results/perf_summary.csv

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nsb-performance-${{ github.run_id }}
          path: nsb-ns3-perf-testing/results
          if-no-files-found: warn
          retention-days: 14
